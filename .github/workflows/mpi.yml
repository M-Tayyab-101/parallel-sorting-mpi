name: MPI Parallel Sort

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install MPI
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y openmpi-bin libopenmpi-dev

      - name: Compile
        run: |
          mpicc -Wall -O2 parallel_sort.c -o parallel_sort

      - name: Run with 4 processes
        run: |
          mpirun --allow-run-as-root --oversubscribe -np 4 ./parallel_sort 16
          
      - name: Run with 8 processes
        run: |
          mpirun --allow-run-as-root --oversubscribe -np 8 ./parallel_sort 80
